name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: pwsh
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "build-tools;36.0.0"

      - name: Build Mihon extension APK
        run: npm run build:mihon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manga-library-build
          path: |
            dist/*.exe
            mihon-extension-build/src/all/mangalibrary/build/outputs/apk/debug/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            mihon-extension-build/src/all/mangalibrary/build/outputs/apk/debug/*.apk
